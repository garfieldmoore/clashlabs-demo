<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tips — Super Smash Bros Ultimate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3); }
      50% { text-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.5); }
    }

    :root {
      --bg-dark: #0a0a0f;
      --bg-card: #1a1a24;
      --accent-gold: #ffd700;
      --accent-red: #ff4444;
      --accent-green: #44ff88;
      --accent-blue: #4488ff;
      --accent-purple: #aa44ff;
      --accent-pink: #ff44aa;
      --accent-orange: #ff8844;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --border: #333344;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1f 50%, #0a0a0f 100%);
      background-size: 200% 200%;
      animation: gradient-shift 15s ease infinite;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(68, 136, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(170, 68, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 2rem 1.5rem 3rem;
      text-align: center;
      border-bottom: 3px solid var(--accent-gold);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 215, 0, 0.2) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 20% 100%, rgba(68, 136, 255, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(170, 68, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
      animation: float 6s ease-in-out infinite;
    }

    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ffd700 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
      position: relative;
      animation: glow 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
    }

    .subtitle {
      font-size: 1rem;
      color: var(--accent-blue);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(68, 136, 255, 0.5);
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.25rem;
    }

    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .nav a::before {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      transition: left 0.5s;
    }

    .nav a:hover {
      color: var(--accent-gold);
      background: rgba(255, 215, 0, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
    }

    .nav a:hover::before { left: 100%; }

    main {
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .search-section {
      background: linear-gradient(135deg, rgba(26, 26, 36, 0.95) 0%, rgba(30, 30, 45, 0.95) 100%);
      backdrop-filter: blur(10px);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s;
    }

    .search-section:hover {
      border-color: var(--accent-gold);
      box-shadow: 0 12px 40px rgba(255, 215, 0, 0.2);
    }

    .search-section label {
      display: block;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--accent-gold);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .searchable-dropdown {
      position: relative;
      max-width: 400px;
    }

    .dropdown-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      background: rgba(10, 10, 15, 0.8);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      cursor: text;
      transition: all 0.3s;
    }

    .dropdown-input:focus {
      outline: none;
      border-color: var(--accent-gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      background: rgba(10, 10, 15, 0.95);
    }

    .dropdown-input::placeholder { color: var(--text-muted); }

    .dropdown-list {
      position: absolute;
      top: 100%; left: 0; right: 0;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, rgba(26, 26, 36, 0.98) 0%, rgba(30, 30, 45, 0.98) 100%);
      backdrop-filter: blur(20px);
      border: 2px solid var(--accent-gold);
      border-radius: 12px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 12px 40px rgba(255, 215, 0, 0.3);
    }

    .dropdown-list.visible { 
      display: block; 
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-option {
      padding: 0.875rem 1.25rem;
      cursor: pointer;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
      transition: all 0.2s;
    }

    .dropdown-option:last-child { border-bottom: none; }

    .dropdown-option:hover,
    .dropdown-option.highlighted {
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
      color: var(--accent-gold);
      transform: translateX(5px);
    }

    .dropdown-empty {
      padding: 0.75rem 1rem;
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
    }

    .tips-display {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    .tips-display.visible { display: block; }

    .tips-grid {
      display: grid;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .tip-card {
      background: linear-gradient(135deg, rgba(26, 26, 36, 0.9) 0%, rgba(30, 30, 45, 0.9) 100%);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.3s;
    }

    .tip-card:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15);
    }

    .tip-card.strategy { border-left: 4px solid var(--accent-green); }
    .tip-card.combo { border-left: 4px solid var(--accent-blue); }
    .tip-card.kill { border-left: 4px solid var(--accent-red); }
    .tip-card.neutral { border-left: 4px solid var(--accent-orange); }
    .tip-card.recovery { border-left: 4px solid var(--accent-purple); }
    .tip-card.general { border-left: 4px solid var(--accent-gold); }

    .tip-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tip-card.strategy h3 { color: var(--accent-green); }
    .tip-card.combo h3 { color: var(--accent-blue); }
    .tip-card.kill h3 { color: var(--accent-red); }
    .tip-card.neutral h3 { color: var(--accent-orange); }
    .tip-card.recovery h3 { color: var(--accent-purple); }
    .tip-card.general h3 { color: var(--accent-gold); }

    .tip-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .tip-card .moves {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }

    .move-tag {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .placeholder-message {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .placeholder-message p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .placeholder-message span {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    footer a { color: var(--accent-gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>

  <header class="hero">
    <h1>Tips</h1>
    <p class="subtitle">Master your character</p>
    <nav class="nav">

      <div class="placeholder-message" id="placeholder">
        <span>🎮</span>
        <p>Select a character above to see tips and strategies</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Super Smash Bros Ultimate &copy; Nintendo. This guide is fan-made and not affiliated with Nintendo.</p>

    const genericTips = [
      { type: 'general', title: 'Fundamentals Matter Most', content: 'No matter what character you play, fundamentals like spacing, timing, and reading your opponent will always be more important than advanced tech. Master the basics first.', moves: [] },
      { type: 'general', title: 'Watch Your Opponent', content: 'Pay attention to your opponent\'s habits. Everyone has patterns - spot them and punish accordingly.', moves: [] },

      { type: 'general', title: 'Recovery Resources', content: 'Know your recovery options. Jumps, Up-B, and other recovery moves are limited - use them wisely.', moves: [] },
      { type: 'general', title: 'Percent Matters', content: 'Know what percentage your kill moves start working. Play around those percents - be aggressive at kill percent, defensive when behind.', moves: [] }
    ];

    const characterInput = document.getElementById('character');
    const dropdownList = document.getElementById('dropdown-list');
    const tipsDisplay = document.getElementById('tips-display');
    const tipsTitle = document.getElementById('tips-title');
    const tipsDesc = document.getElementById('tips-desc');
    const tipsGrid = document.getElementById('tips-grid');
    const placeholder = document.getElementById('placeholder');

    let selectedCharacterIdx = -1;
    let highlightedOptionIdx = -1;

    function renderDropdownOptions(filter = '') {
      const filterLower = filter.toLowerCase().trim();
      const filtered = CHARACTERS.map((name, i) => ({
        name,
        idx: i,
        visible: filterLower === '' || name.toLowerCase().includes(filterLower)
      }));

      const visibleCount = filtered.filter(f => f.visible).length;

      if (visibleCount === 0) {
        dropdownList.innerHTML = '<div class="dropdown-empty">No characters found</div>';
        dropdownList.classList.add('visible');
        return;
      }

      dropdownList.innerHTML = filtered.map((item, i) => {
        if (!item.visible) return '';
        const isHighlighted = i === highlightedOptionIdx;
        return `<div class="dropdown-option ${isHighlighted ? 'highlighted' : ''}" data-idx="${item.idx}">${item.name}</div>`;
      }).filter(html => html).join('');

      dropdownList.querySelectorAll('.dropdown-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const idx = parseInt(opt.dataset.idx, 10);
          selectCharacter(idx);
        });
      });

      dropdownList.classList.add('visible');
    }

    function selectCharacter(idx) {
      selectedCharacterIdx = idx;
      characterInput.value = CHARACTERS[idx];
      dropdownList.classList.remove('visible');
      highlightedOptionIdx = -1;
      renderTips(idx);
    }

    function renderTips(characterIdx) {
      const name = CHARACTERS[characterIdx];
      const tips = TIPS_DATA[name] || genericTips;
      const hasSpecificTips = !!TIPS_DATA[name];

      placeholder.style.display = 'none';
      tipsDisplay.classList.add('visible');

      tipsTitle.textContent = hasSpecificTips ? `${name} Tips` : `${name} - General Tips`;
      tipsDesc.textContent = hasSpecificTips 
        ? `Character-specific strategies and combos for ${name}.`
        : `General tips for all characters. Play ${name} based on your matchup knowledge.`;

      tipsGrid.innerHTML = tips.map(tip => {
        const movesHtml = tip.moves.length 
          ? `<div class="moves">${tip.moves.map(m => `<span class="move-tag">${m}</span>`).join('')}</div>` 
          : '';
        return `
          <div class="tip-card ${tip.type}">
            <h3>${tip.title}</h3>
            <p>${tip.content}</p>
            ${movesHtml}
          </div>
        `;
      }).join('');
    }

    characterInput.addEventListener('focus', () => {
      if (characterInput.value === '') {
        renderDropdownOptions('');
      } else {
        renderDropdownOptions(characterInput.value);
      }
    });

    characterInput.addEventListener('input', (e) => {
      const query = e.target.value;
      highlightedOptionIdx = -1;
      renderDropdownOptions(query);
    });

    characterInput.addEventListener('keydown', (e) => {
      const options = Array.from(dropdownList.querySelectorAll('.dropdown-option'));
      if (options.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlightedOptionIdx = Math.min(highlightedOptionIdx + 1, options.length - 1);
        options.forEach((opt, i) => opt.classList.toggle('highlighted', i === highlightedOptionIdx));
        options[highlightedOptionIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlightedOptionIdx = Math.max(highlightedOptionIdx - 1, -1);
        options.forEach((opt, i) => opt.classList.toggle('highlighted', i === highlightedOptionIdx));
        if (highlightedOptionIdx >= 0) {
          options[highlightedOptionIdx]?.scrollIntoView({ block: 'nearest' });
        }
      } else if (e.key === 'Enter' && highlightedOptionIdx >= 0) {
        e.preventDefault();
        const idx = parseInt(options[highlightedOptionIdx].dataset.idx, 10);
        selectCharacter(idx);
      } else if (e.key === 'Escape') {
        dropdownList.classList.remove('visible');
        highlightedOptionIdx = -1;
      }
    });

    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('character-dropdown');
      if (!dropdown.contains(e.target)) {
        dropdownList.classList.remove('visible');
        highlightedOptionIdx = -1;
      }
    });

    characterInput.addEventListener('blur', () => {
      setTimeout(() => {
        dropdownList.classList.remove('visible');
        highlightedOptionIdx = -1;
      }, 200);
    });
  </script>
